  # ── 3. Email sender ──────────────────────────────────────────────
  email_sender:
    build:
      context: .
      dockerfile: Dockerfile
    image: model-alerts-email-sender:1.0.0
    container_name: email_sender
    # depends_on:
    #   ollama:
    #     condition: service_healthy
    env_file:
      - .env
    environment:
      # Match server local timezone so log filenames (YYYYMMDD) align with datetime.now()
      - TZ=Pacific/Fiji
      - ENABLED_CHECKS
      # - OLLAMA_HOST=ollama:11434
    volumes:
      # Required in prod when NIU_LOG_DIR=/mnt/DATA/NIU/logs
      - /mnt/DATA/NIU/logs:/mnt/DATA/NIU/logs:ro
      # Dev: local NIU sample logs (used when NIU_LOG_DIR=niue_logs)
      - ./niue_logs:/app/niue_logs:ro
      # Required in prod when COKS_LOG_DIR=/mnt/DATA/forecast_models/logs
      - /mnt/DATA/forecast_models/logs:/mnt/DATA/forecast_models/logs:ro
      # Dev: local COK sample logs (used when COKS_LOG_DIR=coks_logs)
      - ./coks_logs:/app/coks_logs:ro
      # Required in prod when CROCO_NIU_LOG_DIR=/data/kunal_croc/kunal_croc/logs
      - /data/kunal_croc/kunal_croc/logs:/data/kunal_croc/kunal_croc/logs:ro
      # Dev: local NIU_Currents sample logs (used when CROCO_NIU_LOG_DIR=croco_niue)
      - ./croco_niue:/app/croco_niue:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: "no"
    command:
      - python
      - main.py

